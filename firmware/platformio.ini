; PlatformIO Configuration for VitaEdge ESP32-S3

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

upload_speed = 921600
monitor_speed = 115200

build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM

lib_deps = 
    ; OLED Display
    acrobotic/Aaronia-Spectran@^1.0.0
    ; BLE
    h2zero/NimBLE-Arduino@^1.4.1
    ; I2C
    ; (built-in)

[env:esp32-s3-mini]
platform = espressif32
board = esp32-s3-mini
framework = arduino
